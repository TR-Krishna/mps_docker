name: CI/CD Pipeline

on: 
  push:
    branches: [ main ]

permissions:
   contents: read
   packages: write

jobs: 
    build-and-push :
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v2
        
        - name: Login to GHCR
          uses: docker/login-action@v2
          with: 
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Build and Push Gateway
          uses: docker/build-push-action@v2
          with: 
            context: ./Gateway.API
            push: true
            tags: ghcr.io/${{ github.repository }}/gateway-api:latest

        - name: Build and Push UserManagementService
          uses: docker/build-push-action@v2
          with: 
            context: ./UserManagementService
            push: true
            tags: ghcr.io/${{ github.repository }}/user-management-service:latest

        - name: Build and Push DataCollectionService
          uses: docker/build-push-action@v2
          with: 
            context: ./DataCollectionService
            push: true
            tags: ghcr.io/${{ github.repository }}/data-collection-service:latest
        
        - name: Build and Push EventService
          uses: docker/build-push-action@v2
          with: 
            context: ./EventService
            push: true
            tags: ghcr.io/${{ github.repository }}/event-service:latest
      
        - name: Build and Push ScheduleService
          uses: docker/build-push-action@v2
          with: 
            context: ./ScheduleService
            push: true
            tags: ghcr.io/${{ github.repository }}/schedule-service:latest

    deploy:
      runs-on: self-hosted
      needs: build-and-push
      steps:
        - name: Deploy 
          run: |
                cd : C:\Users\SESA845697\Documents\mps_docker\API-Gateway-Device-Management-System-main
                docker compose pull
                docker compose up -d
                docker compose ps


