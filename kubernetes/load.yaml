apiVersion: v1
kind: Pod
metadata:
  name: load-cpu-high
  namespace: mps
spec:
  containers:
  - name: stress
    image: polinux/stress
    resources:
      requests:
        cpu: "200m"
      limits:
        cpu: "1000m"
    command: ["stress"]
    args: ["--cpu", "4", "--timeout", "300s"]
  restartPolicy: Never