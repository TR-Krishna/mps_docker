apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scheduleservice-hpa
  namespace: mps
spec: 
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Dployment
    name: scheduleservice
  minReplicas: 1
  maxReplicas: 7
  metrics:
   - type : Resource
     resource: 
      name: cpu
      target: 
        type: Utilization
        averageUtilization: 50
   - type: Resource
     resource: 
        name: memory
        target:
          type: Utilization
          averageUtilization: 50

